project:
  name: "MedLite-CRC"
  seed: 42

data:
  nct_crc_train_dir: "data/NCT-CRC-HE-100K"
  nct_crc_val_dir: "data/CRC-VAL-HE-7K"
  image_size: 224
  num_classes: 9
  num_workers: 4
  pin_memory: true
  classes:
    - ADI
    - BACK
    - DEB
    - LYM
    - MUC
    - MUS
    - NORM
    - STR
    - TUM
  augmentation:
    use_foreground_masking: false
    use_stain_augment: false
    color_jitter: false
    random_flip: false
    random_rotation: false
    normalize_mean: [0.7406, 0.5331, 0.7059]
    normalize_std:  [0.1651, 0.2174, 0.1574]

training:
  val_batch_size: 128
