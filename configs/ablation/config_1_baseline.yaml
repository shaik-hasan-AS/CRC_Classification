project:
  name: "MedLite-CRC"
  description: "Lightweight stain-robust CNN for colon histopathology classification"
  seed: 42

data:
  # Update these paths after downloading
  nct_crc_train_dir: "data/NCT-CRC-HE-100K"
  nct_crc_val_dir: "data/CRC-VAL-HE-7K"
  nct_crc_nonorm_dir: "data/NCT-CRC-HE-100K-NONORM"
  image_size: 224
  num_classes: 9
  num_workers: 4
  pin_memory: true

  # Class names (NCT-CRC-HE-100K)
  classes:
    - ADI   # Adipose
    - BACK  # Background
    - DEB   # Debris
    - LYM   # Lymphocytes
    - MUC   # Mucus
    - MUS   # Smooth Muscle
    - NORM  # Normal Colon Mucosa
    - STR   # Cancer-Associated Stroma
    - TUM   # Colorectal Adenocarcinoma Epithelium

  augmentation:
    use_foreground_masking: true # Mask out bright background with noise
    mask_threshold: 0.85
    grayscale_prob: 0.3          # Color dropout to force texture learning
    use_stain_augment: true      # key for stain robustness
    stain_probability: 0.8       # Boosted for domain shift robustness
    stain_sigma1: 0.3
    stain_sigma2: 0.3
    color_jitter: true
    color_jitter_brightness: 0.3
    color_jitter_contrast: 0.3
    color_jitter_saturation: 0.2
    color_jitter_hue: 0.1
    random_flip: true
    random_rotation: true       # 90/180/270 degrees
    normalize_mean: [0.7406, 0.5331, 0.7059]   # CRC-specific mean
    normalize_std:  [0.1651, 0.2174, 0.1574]   # CRC-specific std

training:
  epochs: 200
  batch_size: 64
  val_batch_size: 128
  optimizer: "adam"
  lr: 0.001
  weight_decay: 0.0001
  scheduler: "cosine"          # cosine annealing with warmup
  warmup_epochs: 2
  early_stopping_patience: 20
  grad_clip: 1.0
  mixed_precision: true         # AMP for RTX 4060
  
  # STR vs MUS Fixes
  loss: "ce"                    # 'ce' or 'focal'. Reverting to CE to avoid source-domain overfitting
  focal_gamma: 2.0
  use_class_weights: true       # Weight loss by inverse frequency
  use_confusion_penalty: false  # Reverting to false to rely on structural features rather than hard penalties

model:
  name: "MedLiteCRC"
  use_stain_norm: false
  use_multiscale: false
  use_se_block: false
  base_channels: 32
  attention_reduction: 16       # SE block reduction ratio
  dropout: 0.4

wandb:
  enabled: true
  project: "MedLite-CRC"
  entity: ""                    # fill in your wandb username
  log_freq: 50                  # log every N batches

outputs:
  checkpoint_dir: "outputs/checkpoints_ablation_baseline"
  log_dir: "outputs/logs_ablation_baseline"
  gradcam_dir: "outputs/gradcam"
  save_top_k: 3                 # keep top-3 checkpoints by val accuracy
