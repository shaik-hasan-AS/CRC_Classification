project:
  name: "MedLite-CRC-Kather"
  description: "Fine-tuning MedLite-CRC on Kather MSI/MSS dataset"
  seed: 42

data:
  train_dir: "data/Kather_MSI_MSS/train"
  test_dir: "data/Kather_MSI_MSS/test"
  image_size: 224
  num_classes: 2
  num_workers: 4
  pin_memory: false

  classes:
    - MSIMUT
    - MSS

  augmentation:
    use_foreground_masking: false
    grayscale_prob: 0.3
    use_stain_augment: true
    stain_probability: 0.8
    stain_sigma1: 0.3
    stain_sigma2: 0.3
    color_jitter: true
    color_jitter_brightness: 0.3
    color_jitter_contrast: 0.3
    color_jitter_saturation: 0.2
    color_jitter_hue: 0.1
    random_flip: true
    random_rotation: true
    normalize_mean: [0.7406, 0.5331, 0.7059]
    normalize_std:  [0.1651, 0.2174, 0.1574]

training:
  epochs: 3
  batch_size: 64
  val_batch_size: 128
  optimizer: "adamw"
  lr: 0.0003
  weight_decay: 0.0001
  scheduler: "cosine"
  warmup_epochs: 1
  early_stopping_patience: 10
  grad_clip: 1.0
  mixed_precision: true
  loss: "ce"
  label_smoothing: 0.1
  use_class_weights: true

model:
  name: "MedLiteCRC"
  base_channels: 32
  attention_reduction: 16
  dropout: 0.4
  use_stain_norm: true
  stain_norm_space: "rgb"
  use_multiscale: true
  use_se_block: false
  padding_mode: "reflect"

outputs:
  checkpoint_dir: "outputs/checkpoints_kather"
  log_dir:        "outputs/logs_kather"
  gradcam_dir:    "outputs/eval_new/kather"
