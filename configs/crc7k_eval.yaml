project:
  name: "MedLite-CRC"
  description: "Lightweight stain-robust CNN for colon histopathology classification"
  seed: 42

data:
  nct_crc_train_dir: "data/NCT-CRC-HE-100K"
  nct_crc_val_dir: "data/CRC-VAL-HE-7K"
  nct_crc_nonorm_dir: ""
  image_size: 224
  num_classes: 9
  num_workers: 4
  pin_memory: true

  classes:
    - ADI
    - BACK
    - DEB
    - LYM
    - MUC
    - MUS
    - NORM
    - STR
    - TUM

  augmentation:
    use_stain_augment: true
    color_jitter: true
    random_flip: true
    random_rotation: true
    normalize_mean: [0.7406, 0.5331, 0.7059]
    normalize_std:  [0.1651, 0.2174, 0.1574]

training:
  epochs: 15
  batch_size: 64
  val_batch_size: 128
  optimizer: "adam"
  lr: 0.001
  weight_decay: 0.0001
  scheduler: "cosine"
  warmup_epochs: 2
  early_stopping_patience: 20
  grad_clip: 1.0
  mixed_precision: true
  
  loss: "focal"
  focal_gamma: 2.0
  use_class_weights: true
  use_confusion_penalty: true

model:
  name: "MedLiteCRC"
  base_channels: 32
  attention_reduction: 16
  dropout: 0.4

wandb:
  enabled: false

outputs:
  checkpoint_dir: "outputs/checkpoints"
  log_dir: "outputs/logs"
  gradcam_dir: "outputs/gradcam"
  save_top_k: 3
