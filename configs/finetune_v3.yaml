# ─────────────────────────────────────────────────────────────────────────────
# MedLite-CRC — Fine-tuning Config v2
# Purpose: Improve CRC-VAL-HE-7K accuracy from 92.4% → ≥93%
#
# Key changes from original config:
#   1. Focal Loss (gamma=2.0) → forces model to focus on hard STR/MUS samples
#   2. Mixup augmentation (alpha=0.2) → better cross-patient generalisation
#   3. Class weights → rebalance to compensate for STR under-performance
#   4. Lower LR (0.0003) → fine-tuning from pretrained checkpoint
#   5. More aggressive stain augmentation
#   6. Cross-val eval every 5 epochs → faster feedback loop
#
# Run: python train.py --config configs/finetune_v2.yaml \
#        --finetune outputs/checkpoints/ckpt_epoch175_acc0.9984.pt
# ─────────────────────────────────────────────────────────────────────────────

project:
  name: "MedLite-CRC-v3-Surgical"
  description: "Fine-tuned V1 with Elastic, Confusion Penalty, and Gamma=1.5"
  seed: 42

data:
  nct_crc_train_dir: "data/NCT-CRC-HE-100K"
  nct_crc_val_dir: "data/CRC-VAL-HE-7K"
  image_size: 224
  num_classes: 9
  num_workers: 4
  pin_memory: true

  classes:
    - ADI
    - BACK
    - DEB
    - LYM
    - MUC
    - MUS
    - NORM
    - STR
    - TUM

  augmentation:
    use_stain_augment: true
    stain_sigma1: 0.3           # ↑ from 0.2 — more aggressive stain perturbation
    stain_sigma2: 0.3           # ↑ from 0.2
    stain_probability: 0.6      # ↑ from 0.5
    color_jitter: true
    color_jitter_brightness: 0.3  # ↑ from 0.2
    color_jitter_contrast: 0.3    # ↑ from 0.2
    color_jitter_saturation: 0.15 # ↑ from 0.1
    color_jitter_hue: 0.08        # ↑ from 0.05
    random_flip: true
    random_rotation: true
    elastic_transform: true       # NEW — morph fibers to break strict straightness
    random_erasing: true          # NEW — random erasing for regularisation
    random_erasing_p: 0.15
    normalize_mean: [0.7406, 0.5331, 0.7059]
    normalize_std:  [0.1651, 0.2174, 0.1574]

training:
  epochs: 100                     # fine-tuning, not full training
  batch_size: 64
  val_batch_size: 128
  optimizer: "adamw"              # AdamW for better weight decay handling
  lr: 0.0003                      # ↓ from 0.001 — fine-tuning LR
  weight_decay: 0.001             # ↑ from 0.0001 — stronger regularisation
  scheduler: "cosine"
  warmup_epochs: 5                # ↓ from 10 — fine-tuning needs less warmup
  early_stopping_patience: 25     # slightly more patient
  grad_clip: 1.0
  mixed_precision: true
  label_smoothing: 0.1

  # Focal Loss config
  loss: "focal"                   # NEW — focal loss instead of CE
  focal_gamma: 1.5                # lowered from 2.0 to not ignore easy STR samples
  use_confusion_penalty: true     # NEW — explicit penalty for STR/MUS confusion

  # Class weighting
  use_class_weights: true         # NEW — rebalance loss by class frequency
  class_weight_method: "effective_num" # Changed from inverse_freq to effective_num

  # Mixup augmentation
  mixup_alpha: 0.2                # NEW — mixup for generalisation

  # Cross-val evaluation frequency
  crossval_eval_freq: 5           # evaluate on CRC-VAL every 5 epochs

model:
  name: "MedLiteCRC"
  base_channels: 32               # same architecture — fine-tuning only
  attention_reduction: 16
  dropout: 0.45                   # ↑ from 0.4 — slightly more dropout

wandb:
  enabled: true
  project: "MedLite-CRC"
  entity: ""
  log_freq: 50

outputs:
  checkpoint_dir: "outputs/checkpoints"
  log_dir: "outputs/logs"
  gradcam_dir: "outputs/gradcam"
  save_top_k: 3
