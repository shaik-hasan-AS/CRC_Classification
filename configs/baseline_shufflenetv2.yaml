data:
  augmentation:
    color_jitter: true
    normalize_mean:
    - 0.7406
    - 0.5331
    - 0.7059
    normalize_std:
    - 0.1651
    - 0.2174
    - 0.1574
    random_flip: true
    random_rotation: true
    use_stain_augment: true
  classes:
  - ADI
  - BACK
  - DEB
  - LYM
  - MUC
  - MUS
  - NORM
  - STR
  - TUM
  image_size: 224
  nct_crc_train_dir: data/NCT-CRC-HE-100K
  nct_crc_val_dir: data/CRC-VAL-HE-7K
  num_classes: 9
  num_workers: 4
  pin_memory: true
model:
  attention_reduction: 16
  base_channels: 32
  dropout: 0.4
  name: ShuffleNetV2
outputs:
  checkpoint_dir: outputs/checkpoints_shufflenetv2
  gradcam_dir: outputs/gradcam
  log_dir: outputs/logs
  save_top_k: 3
project:
  description: Lightweight stain-robust CNN for colon histopathology classification
  name: Baseline-ShuffleNetV2
  seed: 42
training:
  batch_size: 64
  early_stopping_patience: 20
  epochs: 200
  grad_clip: 1.0
  lr: 0.001
  mixed_precision: true
  optimizer: adam
  scheduler: cosine
  val_batch_size: 128
  warmup_epochs: 10
  weight_decay: 0.0001
wandb:
  enabled: true
  entity: ''
  log_freq: 50
  project: MedLite-CRC
