project:
  name: "MedLite-CRC-KD-MobileNet-STARC9"
  description: "Knowledge Distillation from MobileNetV2 to MedLite-CRC on STARC-9"
  seed: 42

data:
  nct_crc_train_dir: "data/STARC-9-10percent/train"
  nct_crc_val_dir:   "data/STARC-9-10percent/val"
  nct_crc_nonorm_dir: ""
  image_size: 224
  num_classes: 9
  num_workers: 8
  pin_memory: true

  classes:
    - ADI   # Adipose
    - BACK  # Background (mapped from BLD)
    - DEB   # Debris (mapped from NCS)
    - LYM   # Lymphocytes
    - MUC   # Mucus
    - MUS   # Smooth Muscle
    - NORM  # Normal Colon Mucosa (mapped from NOR)
    - STR   # Cancer-Associated Stroma (mapped from FCT)
    - TUM   # Colorectal Adenocarcinoma Epithelium

  augmentation:
    use_foreground_masking: false
    mask_threshold: 0.85
    grayscale_prob: 0.0
    use_stain_augment: true
    stain_probability: 0.8
    stain_sigma1: 0.3
    stain_sigma2: 0.3
    color_jitter: true
    color_jitter_brightness: 0.3
    color_jitter_contrast: 0.3
    color_jitter_saturation: 0.2
    color_jitter_hue: 0.1
    random_flip: true
    random_rotation: true
    normalize_mean: [0.7406, 0.5331, 0.7059]
    normalize_std:  [0.1651, 0.2174, 0.1574]

training:
  epochs: 15
  batch_size: 64
  val_batch_size: 128
  optimizer: "adam"
  lr: 0.001
  weight_decay: 0.0001
  scheduler: "cosine"
  warmup_epochs: 2
  early_stopping_patience: 20
  grad_clip: 1.0
  mixed_precision: true

  loss: "ce"
  use_class_weights: true
  use_confusion_penalty: false
  crossval_eval_freq: 5

  # Knowledge Distillation
  use_kd: true
  teacher_name: "MobileNetV2"
  teacher_checkpoint: "outputs/checkpoints_mobilenetv2_starc9/ckpt_epoch014_acc0.9963.pt"
  kd_temperature: 3.0
  kd_alpha: 0.4

model:
  name: "MedLiteCRC"
  base_channels: 32
  attention_reduction: 16
  dropout: 0.4
  use_stain_norm: true
  stain_norm_space: "rgb"
  use_multiscale: true
  use_se_block: false

wandb:
  enabled: false
  project: "MedLite-CRC-STARC9"
  entity: ""
  log_freq: 50

outputs:
  checkpoint_dir: "outputs/checkpoints_kd_mobilenet_starc9"
  log_dir:        "outputs/logs_kd_mobilenet_starc9"
  gradcam_dir:    "outputs/gradcam_starc9"
  save_top_k: 3
