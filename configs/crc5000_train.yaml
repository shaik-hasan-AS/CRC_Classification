project:
  name: MedLite-CRC-CRC5000
  description: Training MedLite-CRC on the massive STARC-9 dataset to achieve universal
    domain generalization
  seed: 42
data:
  nct_crc_train_dir: data/CRC-5000/train
  nct_crc_val_dir: data/CRC-5000/val
  nct_crc_nonorm_dir: ''
  image_size: 224
  num_classes: 9
  num_workers: 4
  pin_memory: true
  classes:
  - ADI
  - BACK
  - DEB
  - LYM
  - MUC
  - MUS
  - NORM
  - STR
  - TUM
  augmentation:
    use_foreground_masking: false
    mask_threshold: 0.85
    grayscale_prob: 0.0
    use_stain_augment: true
    stain_probability: 0.8
    stain_sigma1: 0.3
    stain_sigma2: 0.3
    color_jitter: true
    color_jitter_brightness: 0.3
    color_jitter_contrast: 0.3
    color_jitter_saturation: 0.2
    color_jitter_hue: 0.1
    random_flip: true
    random_rotation: true
    normalize_mean:
    - 0.7406
    - 0.5331
    - 0.7059
    normalize_std:
    - 0.1651
    - 0.2174
    - 0.1574
training:
  epochs: 15
  batch_size: 64
  val_batch_size: 128
  optimizer: adam
  lr: 0.001
  weight_decay: 0.0001
  scheduler: cosine
  warmup_epochs: 2
  early_stopping_patience: 20
  grad_clip: 1.0
  mixed_precision: true
  loss: ce
  focal_gamma: 2.0
  use_class_weights: false
  use_confusion_penalty: false
model:
  name: MedLiteCRC
  base_channels: 32
  attention_reduction: 16
  dropout: 0.4
wandb:
  enabled: true
  project: MedLite-CRC-CRC5000
  entity: ''
  log_freq: 50
outputs:
  checkpoint_dir: outputs/checkpoints_medlite_crc5000
  log_dir: outputs/logs_starc9
  gradcam_dir: outputs/gradcam_starc9
  save_top_k: 3
